<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Washing machine body -->
  <rect x="16" y="22" width="32" height="26" rx="5" fill="white" opacity="0.95"/>
  <!-- Door -->
  <circle cx="32" cy="34" r="9" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <circle cx="32" cy="34" r="4" fill="#3B82F6" opacity="0.15"/>
  <!-- Bubbles -->
  <circle cx="32" cy="26" r="1.5" fill="#60A5FA"/>
  <circle cx="36" cy="24" r="1" fill="#60A5FA"/>
  <circle cx="28" cy="24" r="1" fill="#60A5FA"/>
  <!-- Control panel dots -->
  <circle cx="22" cy="28" r="1.2" fill="#8B5CF6"/>
  <circle cx="26" cy="27" r="1.2" fill="#8B5CF6"/>
</svg>
